<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>free24store_boost</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+JP:wght@400;500;600;700&display=swap" rel="stylesheet">
<script crossorigin src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
<script crossorigin src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
<script crossorigin src="https://unpkg.com/recharts@2.1.16/umd/Recharts.js"></script>
<script crossorigin src="https://unpkg.com/@babel/standalone@7.23.6/babel.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body,#root{height:100%;overflow:hidden}
body{font-family:'Inter','Noto Sans JP',sans-serif;background:#1A1B1E;color:#e9ecef}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:#25262b}::-webkit-scrollbar-thumb{background:#5c5f66;border-radius:3px}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-6px)}40%,80%{transform:translateX(6px)}}
.fade-in{animation:fadeIn .35s ease-out}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.25);border-top-color:#fff;border-radius:50%;animation:spin .55s linear infinite;vertical-align:middle}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-type="module">
/* ===== React hooks & Recharts ===== */
const {useState,useMemo,useCallback,useRef,useEffect}=React;
const RC=Recharts;
const {AreaChart,Area,BarChart,Bar,LineChart,Line,PieChart,Pie,Cell,
       RadarChart,Radar,PolarGrid,PolarAngleAxis,PolarRadiusAxis,
       XAxis,YAxis,CartesianGrid,Tooltip,ResponsiveContainer,Legend}=RC;

/* ===== tiny SVG icon helper (lucide not usable as React) ===== */
const I={
  zap:d=><svg width={d||16} height={d||16} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>,
  pen:d=><svg width={d||16} height={d||16} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 013 3L7 19l-4 1 1-4z"/></svg>,
  chart:d=><svg width={d||16} height={d||16} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M18 20V10M12 20V4M6 20v-6"/></svg>,
  trend:d=><svg width={d||16} height={d||16} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>,
  gear:d=><svg width={d||16} height={d||16} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 01-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09a1.65 1.65 0 00-1-1.51 1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09a1.65 1.65 0 001.51-1 1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06a1.65 1.65 0 00-.33 1.82v.18a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>,
  spark:d=><svg width={d||16} height={d||16} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M12 3l1.5 5.5L19 10l-5.5 1.5L12 17l-1.5-5.5L5 10l5.5-1.5z"/></svg>,
  vid:d=><svg width={d||16} height={d||16} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>,
  send:d=><svg width={d||16} height={d||16} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9"/></svg>,
  refresh:d=><svg width={d||16} height={d||16} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 11-2.12-9.36L23 10"/></svg>,
  check:d=><svg width={d||16} height={d||16} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>,
  alert:d=><svg width={d||16} height={d||16} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>,
  copy:d=><svg width={d||16} height={d||16} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>,
  play:d=><svg width={d||16} height={d||16} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><polygon points="5 3 19 12 5 21"/></svg>,
  clock:d=><svg width={d||16} height={d||16} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>,
  eye:d=><svg width={d||16} height={d||16} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>,
  heart:d=><svg width={d||16} height={d||16} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>,
  cal:d=><svg width={d||16} height={d||16} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>,
  plus:d=><svg width={d||16} height={d||16} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
};

/* ===== Colors / Platforms ===== */
const P=[
  {id:'x',name:'X',color:'#1da1f2',label:'𝕏'},
  {id:'instagram',name:'Instagram',color:'#E1306C',label:'IG'},
  {id:'tiktok',name:'TikTok',color:'#00f2ea',label:'TT'},
  {id:'youtube',name:'YouTube',color:'#FF0000',label:'YT'},
];
const PC={x:'#1da1f2',instagram:'#E1306C',tiktok:'#00f2ea',youtube:'#FF0000'};

/* ===== Shared styles ===== */
const S={
  card:{background:'#25262b',border:'1px solid #373A40',borderRadius:12,padding:16,marginBottom:14},
  h3:{fontSize:13,fontWeight:600,marginBottom:10,display:'flex',alignItems:'center',gap:6},
  topbar:{height:52,borderBottom:'1px solid #373A40',background:'rgba(20,21,23,.8)',backdropFilter:'blur(12px)',display:'flex',alignItems:'center',padding:'0 20px',gap:12,flexShrink:0},
  topH:{fontSize:15,fontWeight:700,display:'flex',alignItems:'center',gap:8},
  input:{width:'100%',background:'#2C2E33',border:'1px solid #5c5f66',borderRadius:8,padding:'7px 11px',color:'white',fontSize:13,outline:'none',fontFamily:'inherit'},
  select:{width:'100%',background:'#2C2E33',border:'1px solid #5c5f66',borderRadius:8,padding:'7px 11px',color:'white',fontSize:13,fontFamily:'inherit'},
  btn:(bg,extra)=>({display:'inline-flex',alignItems:'center',justifyContent:'center',gap:6,padding:'8px 16px',borderRadius:8,fontSize:13,fontWeight:600,cursor:'pointer',border:'none',background:bg||'#2C2E33',color:'white',fontFamily:'inherit',...extra}),
  label:{display:'block',fontSize:11,color:'#909296',marginBottom:4},
  pdot:(c,sz)=>({width:sz||28,height:sz||28,borderRadius:8,background:(c||'#5c7cfa')+'20',color:c||'#5c7cfa',display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:700,flexShrink:0}),
  badge:(c)=>({padding:'1px 7px',borderRadius:99,fontSize:9,fontWeight:600,background:(c||'#5c7cfa')+'30',color:c||'#5c7cfa'}),
};

/* ===== Data gen ===== */
function genDaily(days){const d=[];for(let i=days;i>=0;i--){const dt=new Date(Date.now()-i*864e5);d.push({date:`${dt.getMonth()+1}/${dt.getDate()}`,x:~~(Math.random()*12e3+3e3),instagram:~~(Math.random()*8e3+2e3),tiktok:~~(Math.random()*15e3+5e3),youtube:~~(Math.random()*6e3+1e3),x_e:~~(Math.random()*600+100),ig_e:~~(Math.random()*400+80),tt_e:~~(Math.random()*800+200),yt_e:~~(Math.random()*300+50)});}return d;}

/* ========================================================
   PAGE : CREATE
   ======================================================== */
function CreatePage(){
  const [step,setStep]=useState('gen');
  const [src,setSrc]=useState('');
  const [topic,setTopic]=useState('');
  const [content,setContent]=useState('');
  const [genBusy,setGenBusy]=useState(false);
  const [vidSt,setVidSt]=useState('idle');
  const [selP,setSelP]=useState([]);
  const [pubSt,setPubSt]=useState({});
  const [pubBusy,setPubBusy]=useState(false);
  const [hist,setHist]=useState([]);

  const doGen=async()=>{setGenBusy(true);await new Promise(r=>setTimeout(r,1600));
    const pool=[
      `AI時代のマーケティングは「共感×データ」がキー。\n\nフォロワーが求めているのは完璧な情報ではなく、共感できるストーリー。\n\nデータ分析で最適なタイミングを見極め、感情に響くコンテンツを届ける。\n\n#マーケティング #AI #SNS運用`,
      `おはようございます！\n\n今日の学び: 「継続は力なり」は本当だった。\n\n90日間毎日投稿を続けた結果:\n・フォロワー +3,200人\n・エンゲージ率 2.1% → 4.8%\n・DM問い合わせ 週30件\n\n#朝活 #継続力`,
      `【保存推奨】SNS動画で伸びるコツ5選\n\n1. 最初の1秒で止める\n2. テロップは大きく太く\n3. BGMは流行りを使う\n4. 15秒以内にまとめる\n5. CTAを必ず入れる\n\n#動画マーケティング #TikTok #Reels`,
      `${topic||'ビジネス'}において最も大切なのは「信頼の積み重ね」。\n\n派手なバズは一瞬で消えるが、毎日の小さな価値提供はフォロワーの心に残る。\n\n#${topic||'ビジネス'} #ブランディング`,
    ];setContent(pool[~~(Math.random()*pool.length)]);setGenBusy(false);setStep('vid');};

  const doVid=async()=>{setVidSt('proc');await new Promise(r=>setTimeout(r,2200));setVidSt('ready');setStep('pub');};

  const doPub=async()=>{if(!selP.length)return;setPubBusy(true);const st={};selP.forEach(id=>{st[id]='pub';});setPubSt(st);
    for(const id of selP){await new Promise(r=>setTimeout(r,700+Math.random()*1e3));setPubSt(p=>({...p,[id]:Math.random()>.1?'ok':'fail'}));}
    setPubBusy(false);setHist(p=>[{id:Date.now(),t:content.substring(0,35)+'…',pl:selP,ts:new Date().toLocaleTimeString('ja-JP')},...p]);};

  const tog=id=>setSelP(p=>p.includes(id)?p.filter(x=>x!==id):[...p,id]);
  const reset=()=>{setStep('gen');setContent('');setVidSt('idle');setSelP([]);setPubSt({});setTopic('');};
  const tags=content.match(/#[\w\u3000-\u9FFF]+/g)||[];
  const stI=['gen','vid','pub'].indexOf(step);

  return <div style={{height:'100%',display:'flex',flexDirection:'column'}}>
    {/* top */}
    <div style={S.topbar}>
      <h2 style={S.topH}><span style={{color:'#748ffc'}}>{I.spark(18)}</span> コンテンツ生成 & 一括出稿</h2>
      <div style={{marginLeft:'auto',display:'flex',alignItems:'center',gap:10}}>
        <div style={{display:'flex',alignItems:'center',gap:4}}>
          {['gen','vid','pub'].map((s,i)=><React.Fragment key={s}>
            {i>0&&<div style={{width:18,height:2,background:stI>=i?'#5c7cfa':'#373A40'}}/>}
            <div style={{padding:'2px 10px',borderRadius:99,fontSize:11,fontWeight:600,background:step===s?'#5c7cfa':stI>i?'rgba(92,124,250,.2)':'#2C2E33',color:step===s?'#fff':stI>i?'#748ffc':'#909296'}}>{i+1} {['記事生成','動画生成','出稿'][i]}</div>
          </React.Fragment>)}
        </div>
        <button onClick={reset} style={S.btn('#2C2E33',{fontSize:11,padding:'4px 10px',border:'1px solid #373A40'})}>{I.refresh(11)} リセット</button>
      </div>
    </div>
    {/* body */}
    <div style={{flex:1,overflowY:'auto',padding:18}}>
      <div style={{maxWidth:1060,margin:'0 auto',display:'grid',gridTemplateColumns:'2fr 1fr',gap:18}}>
        {/* LEFT */}
        <div>
          {/* source */}
          <div style={S.card}><h3 style={S.h3}>📌 ソースアカウント</h3>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
              {[{h:'@free24store',n:'free24store',f:'12.5K'},{h:'@boost_official',n:'Boost Official',f:'8.2K'}].map(a=>
                <button key={a.h} onClick={()=>setSrc(a.h)} style={{display:'flex',alignItems:'center',gap:10,padding:10,borderRadius:8,border:`1px solid ${src===a.h?'#5c7cfa':'#373A40'}`,background:src===a.h?'rgba(92,124,250,.08)':'#2C2E33',cursor:'pointer',color:'white',fontFamily:'inherit',fontSize:13,textAlign:'left'}}>
                  <div style={{width:34,height:34,borderRadius:'50%',background:'linear-gradient(135deg,#5c7cfa,#7950f2)',display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontWeight:700,fontSize:14,flexShrink:0}}>{a.n[0]}</div>
                  <div><div style={{fontWeight:600}}>{a.h}</div><div style={{fontSize:11,color:'#909296'}}>{a.f} followers</div></div>
                  {src===a.h&&<span style={{marginLeft:'auto',color:'#748ffc'}}>{I.check(15)}</span>}
                </button>)}
            </div>
          </div>
          {/* settings */}
          <div style={S.card}>
            <h3 style={S.h3}><span style={{color:'#ffd43b'}}>{I.spark(15)}</span> 生成設定</h3>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:10}}>
              <div><label style={S.label}>コンテンツタイプ</label><select style={S.select}><option>ツイート</option><option>スレッド</option><option>キャプション</option></select></div>
              <div><label style={S.label}>トーン</label><select style={S.select}><option>デフォルト（アカウント準拠）</option><option>カジュアル</option><option>プロフェッショナル</option><option>モチベーション</option></select></div>
            </div>
            <div style={{marginBottom:12}}><label style={S.label}>トピック</label><input value={topic} onChange={e=>setTopic(e.target.value)} placeholder="例: AI、マーケティング、起楼…" style={S.input}/></div>
            <button onClick={doGen} disabled={genBusy} style={S.btn('linear-gradient(135deg,#5c7cfa,#4263eb)',{width:'100%',padding:'11px 0',fontSize:14,opacity:genBusy?.65:1,cursor:genBusy?'wait':'pointer'})}>
              {genBusy?<><span className="spinner"/> AI生成中…</>:<>{I.spark(15)} ワンクリック記事生成</>}
            </button>
          </div>
          {/* content */}
          {content&&<div className="fade-in" style={{...S.card,borderColor:'rgba(92,124,250,.3)'}}>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:8}}>
              <h3 style={{...S.h3,margin:0}}><span style={{color:'#748ffc'}}>{I.pen(14)}</span> 生成コンテンツ</h3>
              <div style={{display:'flex',gap:5}}>
                <button onClick={doGen} style={S.btn('#2C2E33',{fontSize:11,padding:'3px 8px',border:'1px solid #373A40'})}>{I.refresh(10)} 再生成</button>
                <button onClick={()=>{try{navigator.clipboard.writeText(content)}catch(e){}}} style={S.btn('#2C2E33',{fontSize:11,padding:'3px 8px',border:'1px solid #373A40'})}>{I.copy(10)} コピー</button>
              </div>
            </div>
            <textarea value={content} onChange={e=>setContent(e.target.value)} rows={6} style={{...S.input,fontFamily:'monospace',lineHeight:1.7,resize:'vertical'}}/>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginTop:6}}>
              <span style={{fontSize:11,color:'#909296'}}>{content.length} 文字</span>
              <div style={{display:'flex',gap:5}}>{tags.map((t,i)=><span key={i} style={S.badge('#748ffc')}>{t}</span>)}</div>
            </div>
          </div>}
          {/* video */}
          {content&&<div className="fade-in" style={S.card}>
            <h3 style={S.h3}><span style={{color:'#b197fc'}}>{I.vid(15)}</span> スクロールショート動画生成</h3>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:10,marginBottom:10}}>
              {['scroll','fade','zoom'].map((s,i)=><button key={s} style={{display:'flex',flexDirection:'column',alignItems:'center',gap:4,padding:10,borderRadius:8,border:`1px solid ${s==='scroll'?'#5c7cfa':'#373A40'}`,background:s==='scroll'?'rgba(92,124,250,.08)':'#2C2E33',cursor:'pointer',color:'white'}}><span style={{fontSize:22}}>{'📜🌀🔍'[i]}</span><span style={{fontSize:11,textTransform:'capitalize'}}>{s}</span></button>)}
            </div>
            <div style={{display:'flex',alignItems:'center',gap:10,background:'#2C2E33',borderRadius:8,padding:10,marginBottom:10}}>
              <div style={{width:30,height:30,background:'#5c7cfa',borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center'}}>{I.play(13)}</div>
              <div style={{flex:1}}><div style={{fontSize:13,fontWeight:600}}>Upbeat Corporate</div><div style={{fontSize:11,color:'#909296'}}>0:15 · Royalty Free</div></div>
              <span style={{fontSize:12,color:'#748ffc',cursor:'pointer'}}>変更</span>
            </div>
            <button onClick={doVid} disabled={vidSt==='proc'} style={S.btn('linear-gradient(135deg,#7950f2,#e64980)',{width:'100%',padding:'11px 0',fontSize:14,opacity:vidSt==='proc'?.65:1,cursor:vidSt==='proc'?'wait':'pointer'})}>
              {vidSt==='proc'?<><span className="spinner"/> 動画生成中…</>:vidSt==='ready'?<>{I.check(15)} 動画生成完了 ✓</>:<>{I.vid(15)} ワンクリック動画生成</>}
            </button>
            {vidSt==='ready'&&<div className="fade-in" style={{display:'flex',alignItems:'center',gap:12,marginTop:10}}>
              <div style={{width:50,height:86,background:'linear-gradient(135deg,#7950f2,#e64980)',borderRadius:8,display:'flex',alignItems:'center',justifyContent:'center'}}>{I.play(18)}</div>
              <div><div style={{fontSize:13,fontWeight:600}}>スクロールショート動画</div><div style={{fontSize:11,color:'#909296',marginTop:2}}>1080×1920 | 15秒 | MP4</div></div>
            </div>}
          </div>}
        </div>
        {/* RIGHT */}
        <div>
          {/* platforms */}
          <div style={S.card}>
            <h3 style={S.h3}><span style={{color:'#51cf66'}}>{I.send(14)}</span> 出稿先</h3>
            <div style={{display:'flex',flexDirection:'column',gap:7}}>
              {P.map(p=>{const st=pubSt[p.id];return <button key={p.id} onClick={()=>tog(p.id)} style={{display:'flex',alignItems:'center',gap:9,padding:9,borderRadius:8,border:`1px solid ${selP.includes(p.id)?'#5c7cfa':'#373A40'}`,background:selP.includes(p.id)?'rgba(92,124,250,.08)':'#2C2E33',cursor:'pointer',color:'white',fontFamily:'inherit',fontSize:13}}>
                <div style={S.pdot(p.color)}>{p.label}</div>
                <span style={{flex:1,textAlign:'left'}}>{p.name}</span>
                {st==='pub'&&<span className="spinner"/>}
                {st==='ok'&&<span style={{color:'#51cf66'}}>{I.check(15)}</span>}
                {st==='fail'&&<span style={{color:'#ff6b6b'}}>{I.alert(15)}</span>}
                {!st&&selP.includes(p.id)&&<span style={{color:'#748ffc'}}>{I.check(15)}</span>}
              </button>;})}
            </div>
            <div style={{marginTop:10,display:'flex',flexDirection:'column',gap:7}}>

/* ========================================================
   LOGIN / REGISTER PAGE
   ======================================================== */
function LoginPage({onLogin}){
  const MASTER_PIN='2424';
  const [authType,setAuthType]=useState('user'); // 'master' or 'user'
  const [mode,setMode]=useState('login');
  const [email,setEmail]=useState('');
  const [pw,setPw]=useState('');
  const [name,setName]=useState('');
  const [pin,setPin]=useState(['','','','']);
  const [busy,setBusy]=useState(false);
  const [err,setErr]=useState('');
  const [shake,setShake]=useState(false);
  const pinRefs=[useRef(null),useRef(null),useRef(null),useRef(null)];

  const handlePinChange=(idx,val)=>{
    if(!/^\d*$/.test(val))return;
    const np=[...pin];np[idx]=val.slice(-1);setPin(np);setErr('');
    if(val&&idx<3)pinRefs[idx+1].current?.focus();
  };
  const handlePinKey=(idx,e)=>{
    if(e.key==='Backspace'&&!pin[idx]&&idx>0)pinRefs[idx-1].current?.focus();
  };

  const doMasterLogin=async(e)=>{
    e&&e.preventDefault();setErr('');
    const code=pin.join('');
    if(code.length<4){setErr('4桁のPINを入力してください');setShake(true);setTimeout(()=>setShake(false),500);return;}
    setBusy(true);
    await new Promise(r=>setTimeout(r,800));
    if(code===MASTER_PIN){
      onLogin({email:'master@free24store.com',name:'マスター管理者',plan:'master',role:'master'});
    } else {
      setErr('PINが正しくありません');setShake(true);setTimeout(()=>setShake(false),500);setPin(['','','','']);pinRefs[0].current?.focus();
    }
    setBusy(false);
  };

  const doSubmit=async(e)=>{
    e.preventDefault(); setErr('');
    if(!email||!pw||(mode==='register'&&!name)){setErr('全ての項目を入力してください');setShake(true);setTimeout(()=>setShake(false),500);return;}
    if(pw.length<6){setErr('パスワードは6文字以上で入力してください');setShake(true);setTimeout(()=>setShake(false),500);return;}
    setBusy(true);
    await new Promise(r=>setTimeout(r,1200));
    const users=JSON.parse(window.__users||'{}');
    if(mode==='register'){
      if(users[email]){setErr('このメールアドレスは既に登録されています');setBusy(false);return;}
      users[email]={name,pw,plan:'free',created:new Date().toISOString()};
      window.__users=JSON.stringify(users);
      onLogin({email,name,plan:'free',role:'user'});
    } else {
      const u=users[email];
      if(!u||u.pw!==pw){setErr('メールアドレスまたはパスワードが正しくありません');setBusy(false);setShake(true);setTimeout(()=>setShake(false),500);return;}
      onLogin({email,name:u.name,plan:u.plan||'free',role:'user'});
    }
    setBusy(false);
  };
  const demoLogin=async()=>{setBusy(true);await new Promise(r=>setTimeout(r,800));onLogin({email:'demo@free24store.com',name:'Demo User',plan:'pro',role:'user'});};

  const LS={
    wrap:{display:'flex',height:'100vh',background:'#0d0e10'},
    left:{flex:1,display:'flex',flexDirection:'column',justifyContent:'center',alignItems:'center',padding:40,background:'linear-gradient(135deg,#0d0e10 0%,#141517 50%,#1A1B1E 100%)'},
    right:{flex:1,display:'flex',flexDirection:'column',justifyContent:'center',alignItems:'center',background:'linear-gradient(135deg,#5c7cfa22,#7950f222)',position:'relative',overflow:'hidden'},
    form:{width:'100%',maxWidth:380},
    inp:{width:'100%',background:'#25262b',border:'1px solid #373A40',borderRadius:10,padding:'12px 14px',color:'white',fontSize:14,outline:'none',fontFamily:'inherit',marginBottom:12,transition:'border .2s'},
    btn:{width:'100%',padding:'13px 0',borderRadius:10,fontSize:15,fontWeight:700,cursor:'pointer',border:'none',color:'white',fontFamily:'inherit',transition:'transform .15s,opacity .15s'},
    tab:{flex:1,padding:'10px 0',borderRadius:8,fontSize:13,fontWeight:600,cursor:'pointer',border:'none',fontFamily:'inherit',transition:'all .2s'},
    pinBox:{width:56,height:60,background:'#25262b',border:'1px solid #373A40',borderRadius:12,color:'white',fontSize:24,fontWeight:700,textAlign:'center',outline:'none',fontFamily:'inherit',transition:'border .2s'},
  };

  const tabActive={background:'linear-gradient(135deg,#5c7cfa,#4263eb)',color:'white'};
  const tabInactive={background:'transparent',color:'#909296',border:'1px solid #373A40'};

  return <div style={LS.wrap}>
    <div style={LS.left}>
      <div style={LS.form}>
        <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:32}}>
          <div style={{width:42,height:42,background:'linear-gradient(135deg,#5c7cfa,#7950f2)',borderRadius:12,display:'flex',alignItems:'center',justifyContent:'center'}}>{I.zap(22)}</div>
          <div><div style={{fontSize:20,fontWeight:800}}>free24store<span style={{color:'#748ffc'}}>_boost</span></div><div style={{fontSize:11,color:'#909296'}}>SNS一括出稿 & AI動画生成</div></div>
        </div>

        {/* Auth type tabs */}
        <div style={{display:'flex',gap:6,marginBottom:24,background:'#1A1B1E',padding:4,borderRadius:10}}>
          <button onClick={()=>{setAuthType('master');setErr('');setPin(['','','','']);}} style={{...LS.tab,...(authType==='master'?tabActive:tabInactive)}}>🔑 マスター</button>
          <button onClick={()=>{setAuthType('user');setErr('');}} style={{...LS.tab,...(authType==='user'?tabActive:tabInactive)}}>👤 一般ユーザー</button>
        </div>

        {authType==='master' ? <>
          <h2 style={{fontSize:24,fontWeight:700,marginBottom:6}}>マスターログイン</h2>
          <p style={{fontSize:13,color:'#909296',marginBottom:24}}>管理者PINコード（4桁）を入力してください</p>
          <form onSubmit={doMasterLogin}>
            <div style={{display:'flex',gap:12,justifyContent:'center',marginBottom:16}}>
              {pin.map((d,i)=><input key={i} ref={pinRefs[i]} type="password" inputMode="numeric" maxLength={1} value={d} onChange={e=>handlePinChange(i,e.target.value)} onKeyDown={e=>handlePinKey(i,e)} style={{...LS.pinBox,...(d?{borderColor:'#5c7cfa'}:{})}} autoFocus={i===0}/>)}
            </div>
            {err&&<div style={{...LS.inp,background:'rgba(255,107,107,.1)',border:'1px solid rgba(255,107,107,.3)',color:'#ff6b6b',marginBottom:12,animation:shake?'shake .4s':'none',padding:'10px 14px',fontSize:12,borderRadius:8,textAlign:'center'}}>⚠️ {err}</div>}
            <button type="submit" disabled={busy} style={{...LS.btn,background:'linear-gradient(135deg,#e64980,#be4bdb)',opacity:busy?.7:1}}>
              {busy?<><span className="spinner"/> 認証中…</>:'マスターログイン'}
            </button>
          </form>
        </> : <>
          <h2 style={{fontSize:24,fontWeight:700,marginBottom:6}}>{mode==='login'?'おかえりなさい':'アカウント作成'}</h2>
          <p style={{fontSize:13,color:'#909296',marginBottom:24}}>{mode==='login'?'アカウントにログインして続けましょう':'無料で始めましょう。クレジットカード不要です。'}</p>
          <form onSubmit={doSubmit}>
            {mode==='register'&&<input value={name} onChange={e=>setName(e.target.value)} placeholder="お名前" style={LS.inp}/>}
            <input type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="メールアドレス" style={LS.inp}/>
            <input type="password" value={pw} onChange={e=>setPw(e.target.value)} placeholder="パスワード（6文字以上）" style={LS.inp}/>
            {err&&<div style={{...LS.inp,background:'rgba(255,107,107,.1)',border:'1px solid rgba(255,107,107,.3)',color:'#ff6b6b',marginBottom:12,animation:shake?'shake .4s':'none',padding:'10px 14px',fontSize:12,borderRadius:8}}>⚠️ {err}</div>}
            <button type="submit" disabled={busy} style={{...LS.btn,background:'linear-gradient(135deg,#5c7cfa,#4263eb)',opacity:busy?.7:1}}>
              {busy?<><span className="spinner"/> 処理中…</>:mode==='login'?'ログイン':'アカウント作成'}
            </button>
          </form>
          <div style={{display:'flex',alignItems:'center',gap:10,margin:'18px 0'}}>
            <div style={{flex:1,height:1,background:'#373A40'}}/><span style={{fontSize:11,color:'#909296'}}>または</span><div style={{flex:1,height:1,background:'#373A40'}}/>
          </div>
          <button onClick={demoLogin} disabled={busy} style={{...LS.btn,background:'linear-gradient(135deg,#37b24d,#0ca678)',opacity:busy?.7:1,marginBottom:12}}>
            {I.play(14)} デモェカウントで体験する
          </button>
          <button onClick={()=>{setMode(mode==='login'?'register':'login');setErr('');}} style={{...LS.btn,background:'transparent',border:'1px solid #373A40',fontSize:13,fontWeight:500}}>
            {mode==='login'?'アカウントをお持ちでない方はこちら':'既にアカウントをお持ちの方はこちら'}
          </button>
        </>}
        <p style={{fontSize:10,color:'#5c5f66',textAlign:'center',marginTop:16}}>ログインすることで、利用規約とプライバシーポリシーに同意したものとみなされます。</p>
      </div>
    </div>
    <div style={LS.right}>
      <div style={{position:'absolute',top:0,left:0,right:0,bottom:0,background:'radial-gradient(circle at 30% 40%,rgba(92,124,250,.15),transparent 60%),radial-gradient(circle at 70% 80%,rgba(121,80,242,.12),transparent 60%)'}}/>
      <div style={{position:'relative',zIndex:1,textAlign:'center',maxWidth:420,padding:40}}>
        <div style={{fontSize:80,marginBottom:20}}>{authType==='master'?'🛡️':'🚀'}</div>
        <h3 style={{fontSize:22,fontWeight:800,marginBottom:12}}>{authType==='master'?<>マスター管理者<br/><span style={{background:'linear-gradient(135deg,#e64980,#be4bdb)',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent'}}>セキュアアクセス</span></>:<>4つのSNSを<br/><span style={{background:'linear-gradient(135deg,#5c7cfa,#e64980)',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent'}}>ワンクリック</span>で管理</>}</h3>
        <p style={{fontSize:13,color:'#909296',lineHeight:1.8}}>{authType==='master'?'全機能・全ユーザーの管理権限\nシステム設定・プラン管理・データエクスポート':'X・Instagram・TikTok・YouTube\nAI記事生成→動画自動生成→一括出稿\n全てがひとつのダッシュボードで完結'}</p>
        <div style={{display:'flex',justifyContent:'center',gap:12,marginTop:24}}>
          {P.map(p=><div key={p.id} style={{...S.pdot(p.color,36),fontSize:13}}>{p.label}</div>)}
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:14,marginTop:28}}>
          {[{v:'50K+',l:'アクティブユーザー'},{v:'2.4M',l:'投稿数/月'},{v:'98%',l:'稼働率'}].map(s=>
            <div key={s.l}><div style={{fontSize:20,fontWeight:800,color:'#748ffc'}}>{s.v}</div><div style={{fontSize:10,color:'#909296'}}>{s.l}</div></div>)}
        </div>
      </div>
    </div>
  </div>;
}

/* ========================================================
   MAIN APP (with auth wrapper)
   ======================================================== */
function App(){
  const [user,setUser]=useState(null);
  const [page,setPage]=useState('create');
  const Pg=PAGES[page];
  if(!user) return <LoginPage onLogin={setUser}/>;
  return <div style={{display:'flex',height:'100vh',overflow:'hidden'}}>
    {/* sidebar */}
    <aside style={{width:224,background:'#141517',borderRight:'1px solid #373A40',display:'flex',flexDirection:'column',flexShrink:0}}>
      <div style={{height:52,display:'flex',alignItems:'center',padding:'0 12px',borderBottom:'1px solid #373A40',gap:8}}>
        <div style={{width:30,height:30,background:'linear-gradient(135deg,#5c7cfa,#7950f2)',borderRadius:8,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>{I.zap(16)}</div>
        <div style={{fontWeight:700,fontSize:13}}>free24store<span style={{color:'#748ffc'}}>_boost</span></div>
      </div>
      <nav style={{flex:1,padding:7,display:'flex',flexDirection:'column',gap:2}}>
        {NAV.map(({id,label,desc,icon:Ic})=>
          <div key={id} onClick={()=>setPage(id)} style={{display:'flex',alignItems:'center',gap:9,padding:'7px 9px',borderRadius:7,cursor:'pointer',border:page===id?'1px solid rgba(92,124,250,.2)':'1px solid transparent',background:page===id?'rgba(92,124,250,.13)':'transparent',color:page===id?'#748ffc':'#C1C2C5',transition:'all .15s'}}>
            <span style={{flexShrink:0}}>{Ic(17)}</span>
            <div style={{display:'flex',flexDirection:'column'}}><span style={{fontSize:12.5,fontWeight:500}}>{label}</span><small style={{fontSize:9.5,color:'#909296'}}>{desc}</small></div>
          </div>)}
      </nav>
      {/* user info */}
      <div style={{margin:'0 7px 4px',padding:'8px 9px',borderRadius:7,display:'flex',alignItems:'center',gap:8,cursor:'pointer',border:'1px solid transparent'}} onClick={()=>setUser(null)}>
        <div style={{width:28,height:28,borderRadius:'50%',background:'linear-gradient(135deg,#e64980,#7950f2)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,fontWeight:700,flexShrink:0}}>{(user.name||'U')[0]}</div>
        <div style={{flex:1,overflow:'hidden'}}><div style={{fontSize:11,fontWeight:600,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{user.name}</div><div style={{fontSize:9,color:'#909296'}}>ログアウト</div></div>
      </div>
      <div style={{margin:'0 7px 10px',background:'linear-gradient(135deg,rgba(92,124,250,.08),rgba(121,80,242,.08))',border:'1px solid rgba(92,124,250,.18)',borderRadius:9,padding:9}}>
        <div style={{display:'flex',alignItems:'center',gap:5,marginBottom:3}}><span style={{color:'#748ffc'}}>{I.spark(13)}</span><span style={{fontSize:10.5,fontWeight:700,color:'#748ffc'}}>{user.plan==='pro'?'PRO PLAN':'FREE PLAN'}</span></div>
        <div style={{fontSize:9.5,color:'#909296'}}>{user.plan==='pro'?'全SNS無制限・AI生成・動画作成':'月5回まで無料・アップグレードはこちら'}</div>
      </div>
    </aside>
    <main style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}><Pg/></main>
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
