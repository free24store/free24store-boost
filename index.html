/* ===== Data gen ===== */
function genDaily(days){const d=[];for(let i=days;i>=0;i--){const dt=new Date(Date.now()-i*864e5);d.push({date:`${dt.getMonth()+1}/${dt.getDate()}`,x:~~(Math.random()*12e3+3e3),instagram:~~(Math.random()*8e3+2e3),tiktok:~~(Math.random()*15e3+5e3),youtube:~~(Math.random()*6e3+1e3),x_e:~~(Math.random()*600+100),ig_e:~~(Math.random()*400+80),tt_e:~~(Math.random()*800+200),yt_e:~~(Math.random()*300+50)});}return d;}

/* ========================================================
   PAGE : CREATE
   ======================================================== */

  const doGen=async()=>{setGenBusy(true);await new Promise(r=>setTimeout(r,1600));
    const pool=[

  const doVid=async()=>{setVidSt('proc');await new Promise(r=>setTimeout(r,2200));setVidSt('ready');setStep('pub');};

  const doPub=async()=>{if(!selP.length)return;setPubBusy(true);const st={};selP.forEach(id=>{st[id]='pub';});setPubSt(st);
    for(const id of selP){await new Promise(r=>setTimeout(r,700+Math.random()*1e3));setPubSt(p=>({...p,[id]:Math.random()>.1?'ok':'fail'}));}
    setPubBusy(false);setHist(p=>[{id:Date.now(),t:content.substring(0,35)+'芒聙娄',pl:selP,ts:new Date().toLocaleTimeString('ja-JP')},...p]);};

  const tog=id=>setSelP(p=>p.includes(id)?p.filter(x=>x!==id):[...p,id]);
  const reset=()=>{setStep('gen');setContent('');setVidSt('idle');setSelP([]);setPubSt({});setTopic('');};
  const tags=content.match(/#[\w\u3000-\u9FFF]+/g)||[];
  const stI=['gen','vid','pub'].indexOf(step);

  return <div style={{height:'100%',display:'flex',flexDirection:'column'}}>
